[project]
name = "lce"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain>=1.2.12",
    "langchain-community>=0.4.1",
    "langchain-ollama>=1.0.1",
    "langchain-openai>=1.1.11",
    "python-dotenv>=1.2.2",
    "tzdata>=2025.3",
]

[dependency-groups]
dev = [
    "filelock>=3.25.2",
    "psutil>=7.2.2",
    "pytest-xdist>=3.8.0",
    "pytest~=7.4.4",
    "pytest-html>=4.0.0",
    "pytest-html-reporter>=0.2.6",
]

#-----------------------------------------------------------------------------
# Build system
# Use "setuptools.build_meta" (classic backend) — works with all setuptools
# versions. The "setuptools.backends.legacy:build" form requires setuptools 69+
# and is NOT needed here.
# -----------------------------------------------------------------------------
[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

# -----------------------------------------------------------------------------
# Pytest — single source of truth (pytest.ini deleted)
# -----------------------------------------------------------------------------
[tool.pytest.ini_options]
pythonpath = ["src"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
markers = [
    "graph_crawl: marker for tests covering the full crawl-to-test-gen graph workflow",
]
