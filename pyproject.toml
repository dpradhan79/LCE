[project]
name = "lce"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain>=1.2.12",
    "langchain-community>=0.4.1",
    "langchain-ollama>=1.0.1",
    "langchain-openai>=1.1.11",
    "pypdf>=6.9.2",
    "python-dotenv>=1.2.2",
    "tzdata>=2025.3",
]

[dependency-groups]
dev = [
    "filelock>=3.25.2",
    "psutil>=7.2.2",
    "pytest-xdist>=3.8.0",
    "pytest~=7.4.4",
    "pytest-html>=4.0.0",
    "pytest-html-reporter>=0.2.6",
]

[tool.setuptools.packages.find]
where = ["src"]          # tells setuptools packages live under src/

[tool.pytest.ini_options]
pythonpath = ["src"]     # lets pytest resolve imports from src/
python_files      = ["test_*.py"]
python_functions  = ["test_*"]
markers = [
    "llm_ollama_models: a marker to run llm_ollama_models",
    "llm_open_ai_models: a marker to run llm_open_ai_models",
    "llm_platform_provider_open_ai: a marker to run llm_platform_provider_open_ai"
]
